<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Αρχείο Πράξεων — Δήμος Γαύδου</title>
<style>
  :root{
    --ink:#13202a; --sea:#0a6e8c; --sea-deep:#073a4c;
    --sand:#f4efe6; --line:#d8d0c2; --accent:#d98f2b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Georgia,"Times New Roman",serif;
    background:var(--sand);color:var(--ink)}
  header{background:linear-gradient(160deg,var(--sea-deep),var(--sea));
    color:#fff;padding:26px 22px;border-bottom:4px solid var(--accent)}
  header h1{margin:0;font-size:1.4rem;letter-spacing:.5px}
  header p{margin:6px 0 0;opacity:.85;font-size:.85rem}
  .wrap{max-width:1100px;margin:0 auto;padding:20px}
  .controls{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0;
    background:#fff;padding:14px;border:1px solid var(--line);border-radius:8px}
  .controls input,.controls select{padding:10px 12px;border:1px solid var(--line);
    border-radius:6px;font-family:inherit;font-size:.92rem}
  .controls input[type=text]{flex:1;min-width:220px}
  .meta{font-size:.82rem;color:#5a5346;margin-bottom:12px}
  .card{background:#fff;border:1px solid var(--line);border-left:4px solid var(--sea);
    border-radius:6px;padding:13px 16px;margin-bottom:11px}
  .card .subj{font-size:1rem;font-weight:bold;margin:0 0 6px}
  .card .row{font-size:.8rem;color:#5a5346;display:flex;flex-wrap:wrap;gap:13px;align-items:center}
  .card a{color:var(--sea);text-decoration:none}
  .card a:hover{text-decoration:underline}
  .tag{display:inline-block;background:var(--sand);border:1px solid var(--line);
    padding:2px 9px;border-radius:20px;font-size:.72rem}
  .pager{display:flex;justify-content:center;gap:8px;margin:22px 0;flex-wrap:wrap}
  .pager button{padding:8px 14px;border:1px solid var(--line);border-radius:6px;
    background:#fff;cursor:pointer;font-family:inherit;color:var(--ink)}
  .pager button:disabled{opacity:.4;cursor:default}
  .pager .cur{background:var(--sea);color:#fff;border-color:var(--sea)}
  footer{text-align:center;padding:22px;color:#7a7263;font-size:.78rem}
  .loading{text-align:center;padding:40px;color:#7a7263}
</style>
</head>
<body>
<header>
  <h1>Αρχείο Πράξεων — Δήμος Γαύδου</h1>
  <p>Επίσημες αποφάσεις & ανακοινώσεις από τη Δι@ύγεια · ιδιωτικό αρχείο</p>
</header>
<div class="wrap">
  <div class="controls">
    <input type="text" id="q" placeholder="Αναζήτηση σε θέμα ή ΑΔΑ...">
    <select id="type"><option value="">— Όλοι οι τύποι —</option></select>
    <select id="year"><option value="">— Όλα τα έτη —</option></select>
  </div>
  <div class="meta" id="meta"></div>
  <div id="list"><div class="loading">Φόρτωση δεδομένων…</div></div>
  <div class="pager" id="pager"></div>
</div>
<footer>
  Πηγή: Πρόγραμμα Δι@ύγεια (CC-BY) · <span id="gen"></span>
</footer>

<script>
const PER_PAGE = 25;
let ALL = [], filtered = [], page = 1;

const $ = id => document.getElementById(id);

function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function applyFilters(){
  const q = $("q").value.trim().toLowerCase();
  const t = $("type").value, y = $("year").value;
  filtered = ALL.filter(a=>{
    if(t && a.decision_type !== t) return false;
    if(y && (a.issue_date||"").slice(0,4) !== y) return false;
    if(q){
      const hay = ((a.subject||"")+" "+(a.ada||"")).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  page = 1;
  render();
}

function render(){
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total/PER_PAGE));
  page = Math.min(page, pages);
  const start = (page-1)*PER_PAGE;
  const slice = filtered.slice(start, start+PER_PAGE);

  $("meta").textContent = `${total} αποτελέσματα · σελίδα ${page} από ${pages}`;

  $("list").innerHTML = slice.length ? slice.map(a=>`
    <div class="card">
      <p class="subj">${esc(a.subject)||"(χωρίς θέμα)"}</p>
      <div class="row">
        <span class="tag">${esc(a.decision_type)||"—"}</span>
        <span>ΑΔΑ: ${esc(a.ada)}</span>
        <span>Έκδοση: ${esc((a.issue_date||"").slice(0,10))}</span>
        ${a.signer?`<span>Υπογράφων: ${esc(a.signer)}</span>`:""}
        <span><a href="${esc(a.diavgeia_url)}" target="_blank" rel="noopener">Διαύγεια ↗</a></span>
        ${a.document_url?`<span><a href="${esc(a.document_url)}" target="_blank" rel="noopener">Έγγραφο ↗</a></span>`:""}
      </div>
    </div>`).join("") : "<p>Δεν βρέθηκαν αποτελέσματα.</p>";

  $("pager").innerHTML = `
    <button ${page<=1?"disabled":""} onclick="go(${page-1})">‹ Προηγ.</button>
    <button class="cur" disabled>${page}</button>
    <button ${page>=pages?"disabled":""} onclick="go(${page+1})">Επόμ. ›</button>`;
}

function go(p){page=p;render();window.scrollTo(0,0);}

function fillFilters(){
  const types = [...new Set(ALL.map(a=>a.decision_type).filter(Boolean))].sort();
  const years = [...new Set(ALL.map(a=>(a.issue_date||"").slice(0,4)).filter(Boolean))].sort().reverse();
  $("type").innerHTML += types.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join("");
  $("year").innerHTML += years.map(y=>`<option value="${y}">${y}</option>`).join("");
}

["q","type","year"].forEach(id=>$(id).addEventListener("input", applyFilters));

fetch("data.json")
  .then(r=>r.json())
  .then(d=>{
    ALL = d.acts || [];
    filtered = ALL;
    $("gen").textContent = d.generated_at ? ("ενημερώθηκε: "+d.generated_at.slice(0,10)) : "";
    fillFilters();
    render();
  })
  .catch(e=>{
    $("list").innerHTML = "<p>Σφάλμα φόρτωσης δεδομένων. Δεν βρέθηκε το data.json.</p>";
  });
</script>
</body>
</html>
