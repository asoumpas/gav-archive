name: Sync Gavdos decisions
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python diavgeia_sync.py --db gavdos.db
      - run: python build_json.py --db gavdos.db --out docs/data.json
      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gavdos.db docs/data.json
          if git diff --staged --quiet; then
            echo "No new acts."
          else
            git commit -m "Auto-sync Gavdos decisions"
            git push
          fi
